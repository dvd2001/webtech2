<mat-card class="card">
    <mat-card-content>
        <h2 class="loginTitle">Login</h2>
        <form class="background" [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form">
            <mat-form-field>
                <input matInput type="text" placeholder="Username" formControlName="username">
            </mat-form-field>
            <br>
            <mat-form-field>
                <input matInput type="password" placeholder="Password" formControlName="password">
            </mat-form-field>
            <br>
            <div id="wrongDatas"></div>
            <button mat-raised-button type="submit" [disabled]="!loginForm.valid" class="submit">Sign In</button>
        </form>
    </mat-card-content>
</mat-card>
<mat-card class="card">
    <mat-card-content>
        <h3 class="title">Don't have an account?</h3>
        <button mat-raised-button routerLinkActive="active" class="reg" routerLink="/registration">Sign Up</button>
    </mat-card-content>
</mat-card>
