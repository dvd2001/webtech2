<mat-card class="menuCard">
    <mat-card-content>
        <button mat-raised-button routerLinkActive="active" routerLink="/products" class="menuBtn">Products</button>
        <button mat-raised-button routerLinkActive="active" routerLink="/dashboard" class="menuBtn">Dashboard</button>
    </mat-card-content>
</mat-card>

<mat-card class="card">
    <h2 class="title">Edit Product</h2>
    <mat-card-content>
        <form [formGroup]="editProductForm" (ngSubmit)="onSubmit()" class="form" novalidate>
            <mat-form-field>
                <input matInput type="text" placeholder="Name" formControlName="name">
                <mat-error *ngIf="myFrom['name'].hasError('required')">Name is required.</mat-error>
                <mat-error *ngIf="myFrom['name'].hasError('minlength')">Name must be at least 2 characters.</mat-error>
                <mat-error *ngIf="myFrom['name'].hasError('pattern')">Name can contain only letters and spaces.</mat-error>
            </mat-form-field>
            <br>
            <mat-form-field>
                <input matInput type="number" placeholder="Quantity" formControlName="quantity">
                <mat-error *ngIf="myFrom['quantity'].hasError('required')">Quantity is required.</mat-error>
                <mat-error *ngIf="myFrom['quantity'].hasError('min')">Quantity cannot be negative.</mat-error>
                <mat-error *ngIf="myFrom['quantity'].hasError('pattern')">Quantity must be a whole number.</mat-error>
            </mat-form-field>
            <br>
            <mat-form-field>
                <select matNativeControl formControlName="typeOfQuantity">
                    <option value="" disabled>Select unit</option>
                    <option value="kg">kg</option>
                    <option value="db">db</option>
                    <option value="liter">liter</option>
                    <option value="g">g</option>
                    <option value="dl">dl</option>
                    <option value="cs">cs</option>
                </select>
                <mat-error *ngIf="myFrom['typeOfQuantity'].hasError('required')">Unit is required.</mat-error>
            </mat-form-field>
            <br>
            <div *ngIf="submitError">{{ submitError }}</div>
            <button mat-raised-button color="primary" type="submit" class="submit">Submit</button>
            <button mat-raised-button type="button" routerLink="/products" class="submit">Cancel</button>
        </form>
    </mat-card-content>
</mat-card>
