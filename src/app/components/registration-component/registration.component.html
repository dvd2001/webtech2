<mat-card class="menuCard">
    <mat-card-content>
        <button mat-raised-button routerLinkActive="/login">Sign In</button>
    </mat-card-content>
</mat-card>

<mat-card class="card">

    <h2 class="title">Registration</h2>
    <mat-card-content>
        <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()" class="form">
            <mat-form-field>
                <input matInput type="text" placeholder="Name" formControlName="name" required>
            </mat-form-field>
            <br>

            <mat-form-field>
                <input matInput type="text" placeholder="Username" formControlName="username" required>
            </mat-form-field>
            <br>

            <mat-form-field>
                <input matInput type="password" formControlName="password" required>
            </mat-form-field>

            <button mat-raised-button class="submit" type="submit">Sign Up</button>
        </form>
    </mat-card-content>
</mat-card>
